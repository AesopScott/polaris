name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'main.js'
      - 'server.js'
      - 'resources/**'
      - 'assets/**'
      - 'package.json'

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Create placeholder secrets
        run: echo 'module.exports = {};' > secrets.js

      - name: Generate icon.icns from icon.ico
        run: |
          pip3 install --quiet Pillow
          python3 - <<'PYEOF'
          from PIL import Image
          import os

          src = Image.open('assets/icon.ico').convert('RGBA')
          os.makedirs('icon.iconset', exist_ok=True)

          specs = [
            (16,   'icon_16x16'),
            (32,   'icon_16x16@2x'),
            (32,   'icon_32x32'),
            (64,   'icon_32x32@2x'),
            (128,  'icon_128x128'),
            (256,  'icon_128x128@2x'),
            (256,  'icon_256x256'),
            (512,  'icon_256x256@2x'),
            (512,  'icon_512x512'),
            (1024, 'icon_512x512@2x'),
          ]

          for size, name in specs:
            img = src.resize((size, size), Image.LANCZOS)
            img.save(f'icon.iconset/{name}.png')
            print(f'  {name}.png ({size}x{size})')
          PYEOF
          iconutil -c icns icon.iconset -o assets/icon.icns
          echo "icon.icns generated successfully"

      - name: Build macOS DMG
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: polaris-macos-${{ github.sha }}
          path: dist/*.dmg
          retention-days: 30
