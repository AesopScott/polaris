name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'main.js'
      - 'server.js'
      - 'resources/**'
      - 'assets/**'
      - 'package.json'

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Create placeholder secrets
        run: echo 'module.exports = {};' > secrets.js

      - name: Generate icon.icns from icon.ico
        run: |
          which magick || brew install imagemagick
          mkdir -p icon.iconset
          magick assets/icon.ico -resize 16x16     icon.iconset/icon_16x16.png
          magick assets/icon.ico -resize 32x32     icon.iconset/icon_16x16@2x.png
          magick assets/icon.ico -resize 32x32     icon.iconset/icon_32x32.png
          magick assets/icon.ico -resize 64x64     icon.iconset/icon_32x32@2x.png
          magick assets/icon.ico -resize 128x128   icon.iconset/icon_128x128.png
          magick assets/icon.ico -resize 256x256   icon.iconset/icon_128x128@2x.png
          magick assets/icon.ico -resize 256x256   icon.iconset/icon_256x256.png
          magick assets/icon.ico -resize 512x512   icon.iconset/icon_256x256@2x.png
          magick assets/icon.ico -resize 512x512   icon.iconset/icon_512x512.png
          magick assets/icon.ico -resize 1024x1024 icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o assets/icon.icns

      - name: Build macOS DMG
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: polaris-macos-${{ github.sha }}
          path: dist/*.dmg
          retention-days: 30
